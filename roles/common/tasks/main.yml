---
- name: Disable swap immediately
  command: swapoff -a
  changed_when: false

- name: Disable swap in /etc/fstab
  replace:
    path: /etc/fstab
    regexp: '^(.*\sswap\s.*)$'
    replace: '# \1'

- name: Load required kernel modules
  command: "modprobe {{ item }}"
  changed_when: false
  loop:
    - overlay
    - br_netfilter

- name: Persist required kernel modules
  copy:
    dest: /etc/modules-load.d/k8s.conf
    mode: '0644'
    content: |
      overlay
      br_netfilter

- name: Configure Kubernetes sysctl parameters
  copy:
    dest: /etc/sysctl.d/99-kubernetes-cri.conf
    mode: '0644'
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1
  notify: Reload sysctl

- name: Install base packages
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - apt-transport-https
      - lsb-release
      - chrony
      - open-vm-tools
    state: present
    update_cache: true

- name: Configure chrony NTP source
  lineinfile:
    path: /etc/chrony/chrony.conf
    line: "server {{ ntp_server }} iburst"
    state: present
  notify: Restart chrony

- name: Configure VMware Tools NIC filtering
  blockinfile:
    path: /etc/vmware-tools/tools.conf
    create: true
    mode: '0644'
    block: |
      [guestinfo]
      primary-nics=ens33
      exclude-nics=antrea-*,cali*,ovs-system,br*,flannel*,veth*,docker*,virbr*,vxlan_sys_*,genev_sys_*
  notify: Restart vmtoolsd
