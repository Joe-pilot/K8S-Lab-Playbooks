---
- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Kubernetes GPG key
  shell: |
    set -e
    curl -fsSL https://pkgs.k8s.io/core:/stable:/{{ k8s_minor_repo }}/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    chmod a+r /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: Add Kubernetes apt repository
  apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg]
      https://pkgs.k8s.io/core:/stable:/{{ k8s_minor_repo }}/deb/ /
    filename: kubernetes
    state: present

- name: Install Kubernetes packages
  apt:
    name:
      - "kubeadm={{ k8s_version }}"
      - "kubelet={{ k8s_version }}"
      - "kubectl={{ k8s_version }}"
    state: present
    update_cache: true

- name: Hold Kubernetes packages
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl

- name: Enable kubelet
  service:
    name: kubelet
    enabled: true
